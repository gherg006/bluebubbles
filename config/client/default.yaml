application:
  name: BlueBubbles
  environment: production

server:
  base_url: https://192.168.0.210:8443
  websocket_url: wss://192.168.0.210:8443/api/v1/ws
  connect_timeout_seconds: 10
  request_timeout_seconds: 30
  retry_limit: 3
  automatic_reconnect: true

tls:
  verify_certificates: true
  allow_certificate_pinning: true

transfers:
  upload_concurrency: 2
  download_concurrency: 3
  chunk_concurrency: 2
  automatic_image_download_limit_bytes: 10485760

logging:
  level: INFO
  console_enabled: false

storage:
  default_cache_limit_bytes: 2147483648
  maximum_cache_limit_bytes: 5368709120
  thumbnail_cache_limit_bytes: 268435456
  attachment_cache_limit_bytes: 1610612736
  encrypted_message_cache_limit_bytes: 268435456
  recent_messages_per_conversation: 500
  cleanup_target_ratio: 0.9
  disk_warning_free_bytes: 2147483648
  disk_critical_free_bytes: 524288000
