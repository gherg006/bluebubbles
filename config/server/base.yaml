application:
  name: BlueBubbles
  timezone: UTC

network:
  host: 127.0.0.1
  port: 8443
  request_timeout_seconds: 30
  websocket_heartbeat_seconds: 30
  websocket_missed_heartbeat_limit: 3

messaging:
  client_plaintext_character_limit: 8000
  default_page_size: 50
  maximum_page_size: 100
  edit_window_seconds: 900
  maximum_group_members: 100

attachments:
  default_chunk_size_bytes: 1048576
  maximum_plaintext_size_bytes: 2147483648
  minimum_chunk_size_bytes: 262144
  maximum_chunk_size_bytes: 8388608
  upload_session_lifetime_seconds: 86400
  orphan_lifetime_seconds: 86400
  maximum_concurrent_uploads_per_user: 3
  maximum_concurrent_downloads_per_user: 3
  chunk_retry_limit: 3

authentication:
  failed_login_limit: 5
  failed_login_window_seconds: 900
  application_lockout_seconds: 900
  default_role: Employee

tokens:
  signing_algorithm: HS256
  access_token_lifetime_seconds: 900
  refresh_token_lifetime_seconds: 604800
  rotation_enabled: true
  reuse_detection_enabled: true
