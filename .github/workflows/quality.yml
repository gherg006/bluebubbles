name: quality

on:
  push:
  pull_request:

permissions:
  contents: read

jobs:
  quality:
    runs-on: windows-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-python@v6
        with:
          python-version: "3.13.5"
          cache: pip
      - run: python -m pip install ".[development]"
      - run: python scripts/development/run_quality_checks.py
      - run: python -m pip_audit --locked .
      - run: python scripts/deployment/build_release.py --created-by ci --output dist/server
      - run: python scripts/packaging/build_client.py --output dist/client
      - uses: actions/upload-artifact@v4
        with:
          name: task-21-packages
          path: |
            dist/server
            dist/client

  postgres:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    services:
      postgres:
        image: postgres:17
        env:
          POSTGRES_DB: bluebubbles_test
          POSTGRES_USER: bluebubbles_test
          POSTGRES_PASSWORD: synthetic-ci-password
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U bluebubbles_test -d bluebubbles_test"
          --health-interval 5s --health-timeout 5s --health-retries 10
    env:
      BLUEBUBBLES_DATABASE_URL: postgresql+asyncpg://bluebubbles_test:synthetic-ci-password@127.0.0.1:5432/bluebubbles_test
      BLUEBUBBLES_TEST_DATABASE_URL: postgresql+asyncpg://bluebubbles_test:synthetic-ci-password@127.0.0.1:5432/bluebubbles_test
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-python@v6
        with:
          python-version: "3.13.5"
          cache: pip
      - run: python -m pip install ".[development]"
      - run: sudo apt-get update
      - run: sudo apt-get install --yes shellcheck
      - run: shellcheck scripts/deployment/*.sh
      - run: python -m venv .server-venv
      - run: .server-venv/bin/python -m pip install --requirement deployment/server-requirements.txt
      - run: .server-venv/bin/python -m pip install --no-build-isolation --no-deps .
      - run: .server-venv/bin/python -m pip check
      - run: python -m pip_audit --requirement deployment/server-requirements.txt --no-deps --disable-pip
      - run: alembic upgrade head
      - run: python -m pytest tests/integration -m "not redis and not ldap" --no-cov
